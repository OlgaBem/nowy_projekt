<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Lista Ogłoszeń</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Lista Ogłoszeń</h1>
    <ul>
        {% for ogloszenie in ogloszenia %}
            <li>
                <strong>{{ ogloszenie.tytul }}</strong> - {{ ogloszenie.cena }} zł <br>
                {{ ogloszenie.opis }} <br>
                <small>Dodano: {{ ogloszenie.data_dodania }}</small>
                <div class="bg-info w-50"><a href="{% url 'rezerwuj_ogloszenie' ogloszenie.id %}" >Zarezerwuj</a></div>
            </li>
        {% endfor %}
    </ul>

</body>
</html>
